<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0a0a0a"/>

  <!-- Belt stripe (horizontal, like a BJJ black belt) -->
  <rect x="0" y="216" width="512" height="80" fill="#18181b"/>

  <!-- Belt knot detail (center) -->
  <rect x="226" y="200" width="60" height="112" rx="8" fill="#27272a"/>
  <rect x="236" y="210" width="40" height="92" rx="4" fill="#1a1a1e"/>

  <!-- Red bar on black belt (coral/instructor mark) -->
  <rect x="236" y="246" width="40" height="20" rx="3" fill="#dc2626"/>

  <!-- The "B" — clean, geometric, heavy weight -->
  <text x="256" y="290"
    font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif"
    font-size="220"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-8"
    opacity="0.95"
  >B</text>

  <!-- Subtle glow behind the B -->
  <text x="256" y="290"
    font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif"
    font-size="220"
    font-weight="900"
    fill="#7c3aed"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-8"
    opacity="0.15"
    filter="url(#glow)"
  >B</text>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
